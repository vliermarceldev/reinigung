name: CI Quality Gate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  PUBLIC_WEB3FORMS_ACCESS_KEY: "ci-test-key-12345"

jobs:
  build-and-check:
    name: 🔎 Quality Gate (Lint, Check & E2E)
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🎭 Install Playwright Browsers (Cross-Browser)
        # Jetzt werden Chromium, Firefox und WebKit installiert
        run: npx playwright install --with-deps chromium firefox webkit

      - name: 🧹 Lint Code (ESLint)
        run: npm run lint

      - name: 💅 Check Formatting (Prettier)
        run: npx prettier --check .

      - name: 🚨 Static Check & E2E Tests
        run: npm run check

      - name: 🔗 Deep Link Check (Lychee)
        uses: lycheeverse/lychee-action@v3
        with:
          args: --offline --include-fragments ./dist/**/*.html
          fail: true
